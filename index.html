<div class="main">

<section id="inicio">
<h1>Bem-vindo ao Sistema JB SANTOS</h1>
</section>

<section id="produtos" style="display:none">

<input id="pNome" placeholder="Produto">

<input id="pCusto" type="number" placeholder="Custo">

<section id="pdv" style="display:none">
<h1>CAIXA</h1>

<div class="pdv-container">

<div class="pdv-left">

<div class="card">
<input id="buscaProduto" placeholder="Digite código ou descrição" oninput="buscarProduto()">
<select id="prod"></select>
<input id="qtd" type="number" value="1">
<button class="primary" onclick="addItem()">Adicionar</button>
</div>

<div class="card">
<table id="itens"></table>
</div>

</div>

<div class="pdv-right">

<div style="display:flex; gap:5px;">
<input id="clienteNome" placeholder="Nome do Cliente" onblur="buscarCliente()">

💳 Ver Saldo

<div id="infoCliente" style="margin-top:8px;font-size:13px; display:none;"></div>

<option value="conta">Marcar na Conta</option>
</select>

<select id="parcelas" onchange="calcularParcelas()"></select>

Desconto: <span id="descontoInfo">0</span>%
</div>

R$ <span id="total">0.00</span>

<script>

let produtos=JSON.parse(localStorage.getItem("produtosJB"))||[];
let vendas=JSON.parse(localStorage.getItem("vendasJB"))||[];
let clientes = [];
let extratos = JSON.parse(localStorage.getItem("extratosJB")) || [];
let numeroRecibo = parseInt(localStorage.getItem("numeroRecibo")) || 1;
let clientePagamentoAtual = null;
let orcamentoEmEdicaoId = null;

let carrinho=[];
let descontoAtual=0;

function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
if(id==="estoque") atualizarEstoque();
if(id==="historico") carregarHistoricoDoBanco();
}




async function buscarCliente(){

  let nome = document.getElementById("clienteNome").value;

  if(!nome) return;

  const { data, error } = await supabaseClient
    .from("clientes")
    .select("*")
    .ilike("nome", nome)
    .limit(1)
    .single();

  if(error || !data){
    console.log("Cliente não encontrado");
    return;
  }

  document.getElementById("telefoneCliente").value = data.telefone || "";

}
 








 
function atualizarFormaPagamento(){

areaCartao.style.display="none";
areaDinheiro.style.display="none";

if(formaPagamento.value==="cartao"){
areaCartao.style.display="block";
}

if(formaPagamento.value==="dinheiro"){
areaDinheiro.style.display="block";
}

calcularParcelas();
calcularTroco();
}



function verificarFormaPagamento(){

let pagamento = formaPagamento.value;

if(pagamento === "cartao"){
    divParcelas.style.display = "block";
}
else{
    divParcelas.style.display = "none";
}

}


function calcularTroco(){

let total = parseFloat(document.getElementById("total").innerText) || 0;

// se estiver vazio
if(valorRecebido.value.trim() === ""){
troco.value = "R$ 0,00";
return;
}

let recebido = parseFloat(valorRecebido.value) || 0;

let trocoCalc = recebido - total;

if(trocoCalc < 0){
troco.value = "Falta R$ " + Math.abs(trocoCalc).toFixed(2);
}else{
troco.value = "R$ " + trocoCalc.toFixed(2);
}

}

function calcularParcelas(){
let total=parseFloat(document.getElementById("total").innerText)||0;
let p=parseInt(parcelas.value)||1;
let valor=(total/p)||0;
valorParcela.value="R$ "+valor.toFixed(2);
}

function preencherParcelas(){
parcelas.innerHTML="";
for(let i=1;i<=12;i++){
parcelas.innerHTML+=`<option value="${i}">${i}x</option>`;
}
}

async function addProduto() {

  const nome = pNome.value.trim();
  const codigo = pCodigo.value.trim();
  const custo = Number(pCusto.value);
  const venda = Number(pVenda.value);
  const quantidade = Number(pQtd.value);
  const minimo = Number(pMin.value);

  if(!nome || !codigo){
    alert("Preencha nome e código!");
    return;
  }

  // 🔎 Verifica se já existe produto com esse código
  const { data: produtoExistente, error: erroBusca } = await supabaseClient
    .from("produtos")
    .select("*")
    .eq("codigo", codigo)
    .single();

  if (produtoExistente) {

    // 🔄 Se já existir → soma quantidade
    const novaQuantidade = produtoExistente.quantidade + quantidade;

    const { error: erroUpdate } = await supabaseClient
      .from("produtos")
      .update({
        quantidade: novaQuantidade,
        custo: custo,
        venda: venda,
        produto: nome
      })
      .eq("codigo", codigo);

    if (erroUpdate) {
      console.error(erroUpdate);
      alert("Erro ao atualizar produto");
      return;
    }

    alert("Produto atualizado e estoque somado!");

  } else {

    // ➕ Se não existir → cria novo
    const { error: erroInsert } = await supabaseClient
      .from("produtos")
      .insert([{
        produto: nome,
        codigo: codigo,
        custo: custo,
        venda: venda,
        quantidade: quantidade,
        minimo: minimo
      }]);

    if (erroInsert) {
      console.error(erroInsert);
      alert("Erro ao salvar produto");
      return;
    }

    alert("Produto cadastrado com sucesso!");
  }

  // limpa campos
  pNome.value = "";
  pCodigo.value = "";
  pVenda.value = "";
  pCusto.value = "";
  pQtd.value = "";
  pMin.value = "";

  carregarProdutos();
}



 async function carregarProdutos() {

  const { data, error } = await supabaseClient
    .from("produtos")
    .select("*");

  if (error) {
    console.log(error);
    return;
  }

  produtos = data; // substitui o array local
  atualizarProdutos();
  atualizarSelect();
}






function buscarProduto(){
const termo = buscaProduto.value.toLowerCase().trim();

if(!termo){
atualizarSelect();
return;
}

const indexExato = produtos.findIndex(p => p.codigo.toLowerCase() === termo);

if(indexExato !== -1){
prod.value = indexExato;
qtd.focus();
qtd.select();
return;
}

prod.innerHTML="";
produtos.forEach((p,i)=>{
if(
p.produto.toLowerCase().includes(termo) ||
p.codigo.toLowerCase().includes(termo)
){
prod.innerHTML+=`<option value="${i}">${p.produto}</option>`;
}
});
}

function atualizarProdutos(){
const t = tProdutos;

t.innerHTML = `
<tr>
<th>Nome</th>
<th>Código</th>
<th>Venda</th>
<th>Qtd</th>
<th>Ação</th>
</tr>`;

produtos.forEach((p,index)=>{

t.innerHTML += `
<tr>
<td>${p.produto}</td>
<td>${p.codigo}</td>
<td>R$ ${Number(p.venda).toFixed(2)}</td>
<td>${p.quantidade}</td>
<td><button class="red" onclick="excluirProduto(${index})">Excluir</button></td>
</tr>`;

});
}


async function excluirProduto(index){

  if(!confirm("Deseja excluir este produto?")) return;

  const produto = produtos[index];

  const { error } = await supabaseClient
    .from("produtos")
    .delete()
    .eq("codigo", produto.codigo);

  if(error){
    console.error(error);
    alert("Erro ao excluir no banco!");
    return;
  }

  alert("Produto excluído com sucesso!");

  carregarProdutos(); // 🔥 recarrega direto do Supabase
}



function atualizarSelect(){
prod.innerHTML="";
produtos.forEach((p,i)=>{
prod.innerHTML+=`<option value="${i}">${p.produto}</option>`;
});
}

function addItem(){
const index=prod.value;
const qtdVal=parseInt(qtd.value);

if(produtos[index].quantidade < qtdVal){
alert("Estoque insuficiente");
return;
}

carrinho.push({
index:index,
nome:produtos[index].produto,
preco:produtos[index].venda,
qtd:qtdVal
});

atualizarCarrinho();
}

function atualizarCarrinho(){

let subtotal = 0;

calcularTroco();

itens.innerHTML="<tr><th>Produto</th><th>Qtd</th><th>Total</th><th>Ação</th></tr>";

carrinho.forEach((item,index)=>{

let sub = item.preco * item.qtd;
subtotal += sub;

itens.innerHTML+=`<tr>
<td>${item.nome}</td>
<td>${item.qtd}</td>
<td>R$ ${sub.toFixed(2)}</td>
<td>
<button class="btn-remove" onclick="removerItem(${index})">X</button>
</td>
</tr>`;
});

let valorDesconto = subtotal * (descontoAtual / 100);
let total = subtotal - valorDesconto;

if(total < 0) total = 0;

// 🔥 atualiza os valores na box nova
document.getElementById("subtotal").innerText = subtotal.toFixed(2);
document.getElementById("descontoInfo").innerText = descontoAtual.toFixed(2);
document.getElementById("total").innerText = total.toFixed(2);

calcularParcelas();
}

function removerItem(index){
carrinho.splice(index,1);
atualizarCarrinho();
}

function toggleDesconto(){
areaDesconto.style.display="block";
}


function aplicarDesconto(){

let porcentagem = parseFloat(valorDesconto.value) || 0;

if(porcentagem < 0) porcentagem = 0;
if(porcentagem > 100) porcentagem = 100;

descontoAtual = porcentagem;

areaDesconto.style.display="none";
valorDesconto.value="";

atualizarCarrinho();
}


async function finalizarVenda(){

if(carrinho.length===0){
alert("Carrinho vazio");
return;
}


if(!confirm("Confirmar finalização da venda?")){
  return;
}

let total=parseFloat(document.getElementById("total").innerText);
let cliente = document.getElementById("clienteNome").value || "Consumidor";
let telefoneCliente = document.getElementById("telefoneCliente")?.value || "";
let vendaId = Date.now();



// ============================
// 🔥 SE FOR MARCAR NA CONTA
// ============================
if(formaPagamento.value === "conta"){

let cliente = clientes.find(c => c.nome === clienteNome.value);

if(!cliente){
  alert("Cliente não encontrado!");
  return;
}

let disponivel = cliente.limite - cliente.saldo;

if(total > disponivel){
  alert(`⚠️ LIMITE INSUFICIENTE!
Disponível: R$ ${disponivel.toFixed(2)}
Valor da venda: R$ ${total.toFixed(2)}`);
  return;
}

// 🔥 1️⃣ Inserir venda no banco
const { data: vendaCriada, error: erroVenda } = await supabaseClient
  .from("vendas")
  .insert([{
    cliente_id: cliente.id,
    nome_do_cliente: cliente.nome,
    telefone_do_cliente: telefoneCliente,
    forma_pagamento: "conta",
    subtotal: total,
    desconto: descontoAtual,
    total: total,
    tipo: "VENDA"
  }])
  .select()
  .single();

if (erroVenda) {
  console.error(erroVenda);
  alert("Erro ao salvar venda na conta!");
  return;
}

const vendaIdBanco = vendaCriada.id;

// 🔥 2️⃣ Inserir itens da venda
for (let item of carrinho) {

  const produto = produtos[item.index];

  await supabaseClient
    .from("itens_venda")
    .insert([{
      venda_id: vendaIdBanco,
      produto_id: produto.id,
      quantidade: item.qtd,
      preco_unitario: item.preco
    }]);

  await supabaseClient
    .from("produtos")
    .update({
      quantidade: produto.quantidade - item.qtd
    })
    .eq("id", produto.id);
}

// 🔥 3️⃣ Atualizar saldo do cliente no banco
const novoSaldo = cliente.saldo + total;
const novoDisponivel = cliente.limite - novoSaldo;

await supabaseClient
  .from("clientes")
  .update({
    saldo: novoSaldo,
    disponivel: novoDisponivel
  })
  .eq("id", cliente.id);

cliente.saldo = novoSaldo;
cliente.disponivel = novoDisponivel;


// 🔥 4️⃣ INSERIR MOVIMENTAÇÃO NO EXTRATO
await supabaseClient
  .from("movimentacoes_clientes")
  .insert([{
    cliente_id: cliente.id,
    data: new Date(),
    descricao: "Venda no PDV",

    tipo: "debito"
  }]);

 
await carregarClientes();
await carregarProdutos();

carrinho = [];
descontoAtual = 0;

atualizarCarrinho();
atualizarClientes();

return;

// 1️⃣ Calcular subtotal

  return acc + (item.preco * item.qtd);
}, 0);

// 2️⃣ Inserir na tabela vendas
const { data: vendaCriada, error: erroVenda } = await supabaseClient
  .from("vendas")
  .insert([{
    cliente_id: null, 
    nome_do_cliente: cliente,
    telefone_do_cliente: telefoneCliente,

    subtotal: subtotal,
    desconto: descontoAtual,
    total: total,
    tipo: "VENDA"
  }])
  .select()
  .single();

if (erroVenda) {
  console.error(erroVenda);
  alert("Erro ao salvar venda!");
  return;
}

const vendaIdBanco = vendaCriada.id;

// 3️⃣ Inserir itens da venda
for (let item of carrinho) {

  const produto = produtos[item.index];

  const { error: erroItem } = await supabaseClient
    .from("itens_venda")
    .insert([{
      venda_id: vendaIdBanco,
      produto_id: produto.id,
      quantidade: item.qtd,
      preco_unitario: item.preco
    }]);

  if (erroItem) {
    console.error(erroItem);
    alert("Erro ao salvar item da venda!");
    return;
  }

  // 4️⃣ Atualizar estoque no banco
 await supabaseClient
  .from("produtos")
  .update({
    quantidade: produto.quantidade - item.qtd
  })
  .eq("id", produto.id);
}

// 5️⃣ Recarregar produtos do banco
await carregarProdutos();
 atualizarProdutos();

imprimirCupom(total,"VENDA");

alert("Venda finalizada com sucesso!");

carrinho=[];
descontoAtual=0;

atualizarCarrinho();
atualizarClientes();
 await carregarHistoricoDoBanco();
}

async function buscarOuCriarCliente(nome){

  .from("clientes")

  .ilike("nome", nome)
  .maybeSingle();

}

  }])

  .single();

async function verExtrato(clienteId){

  const cliente = clientes.find(c => c.id == clienteId);
  if(!cliente){
    alert("Cliente não encontrado");
    return;
  }

  // 🔹 BUSCAR VENDAS NA CONTA
  const { data: vendas, error: erroVendas } = await supabaseClient
    .from("vendas")
    .select("id, total, created_at")
    .eq("cliente_id", clienteId)
    .eq("forma_pagamento", "conta");

  if(erroVendas){
    console.error(erroVendas);
    alert("Erro ao buscar vendas");
    return;
  }

  // 🔹 BUSCAR PAGAMENTOS
  const { data: pagamentos, error: erroPag } = await supabaseClient
    .from("pagamentos")
   .select("valor, criado_em")
    .eq("cliente_id", clienteId);

  if(erroPag){
    console.error(erroPag);
    alert("Erro ao buscar pagamentos");
    return;
  }

  // 🔹 JUNTAR TUDO
  let extrato = [];

    extrato.push({
      data: v.created_at,
      descricao: "Venda no PDV",
      valor: Number(v.total)
    });
  });

  pagamentos.forEach(p => {
    extrato.push({
      data: p.criado_em,
      descricao: "Pagamento",
      valor: -Number(p.valor)
    });
  });

  // 🔹 ORDENAR POR DATA
  extrato.sort((a,b) => new Date(a.data) - new Date(b.data));

  // 🔹 CALCULAR SALDO PROGRESSIVO
  let saldo = 0;
  let html = "";

  extrato.forEach(item => {

  saldo += item.valor;

  let cor = item.valor > 0 ? "#c62828" : "#1fa84f";

  // 🔹 DEFINE TEXTO COM ÍCONE
  let descricaoFormatada = "";

  if(item.valor > 0){
    descricaoFormatada = "🛒 Compra";
  } else {
    descricaoFormatada = "💰 Pagamento";
  }

  html += `
      <tr>
        <td style="padding:8px;">
          ${new Date(item.data).toLocaleString()}
        </td>

        <td style="padding:8px; font-weight:bold;">

async function confirmarPagamento(){

  let cliente = clientePagamentoAtual;

  let valor = parseFloat(document.getElementById("valorPagamento").value);

    return;
  }

  // 🔹 INSERE USANDO SUA ESTRUTURA REAL
  const { error } = await supabaseClient
    .from("pagamentos")
    .insert([{
     cliente_id: cliente.id, // porque sua coluna é TEXT
      valor: valor,
      criado_em: new Date().toISOString()
    }]);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  // 🔹 ATUALIZA SALDO NO BANCO
  const novoSaldo = cliente.saldo - valor;

  await supabaseClient
    .from("clientes")
    .update({ saldo: novoSaldo })
    .eq("id", cliente.id);

  alert("Pagamento registrado com sucesso!");

  fecharModalPagamento();
  await carregarClientes();
}

 async function calcularSaldoCliente(clienteId){

  // TOTAL VENDAS
  const { data: vendas, error: erroVendas } = await supabaseClient
    .from("vendas")
    .select("total")


  if(erroVendas){
    console.error(erroVendas);
    return null;
  }

  // TOTAL PAGAMENTOS
  const { data: pagamentos, error: erroPag } = await supabaseClient
    .from("pagamentos")
    .select("valor")


  if(erroPag){
    console.error(erroPag);
    return null;
  }

  const totalVendas = vendas.reduce((soma, v) => soma + Number(v.total), 0);
  const totalPagamentos = pagamentos.reduce((soma, p) => soma + Number(p.valor), 0);

  const saldo = totalVendas - totalPagamentos;

  return {
    totalVendas,
    totalPagamentos,
    saldo
  };
}

// Função para carregar
async function carregarConfig() {

  const { data, error } = await supabaseClient
    .from("empresa")
    .select("*")
    .limit(1)
    .maybeSingle();

  if (error) {
    console.error(error);
    return;
  }

  if (data) {
    config = data;

    document.getElementById("confNome").value = data.nome || "";
    document.getElementById("confCnpj").value = data.cnpj || "";
    document.getElementById("confEndereco").value = data.endereco || "";
    document.getElementById("confTelefone").value = data.telefone || "";
  }
}

// Quando a página carregar
document.addEventListener("DOMContentLoaded", () => {
  carregarConfig();
  document.getElementById("btnSalvar").addEventListener("click", salvarConfig);
});

</script>
